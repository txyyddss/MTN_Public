name: Bug Report
description: Create a report to help us improve MTNetwork
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to fill out this bug report!"
  - type: input
    id: username
    attributes:
      label: In-Game Username / UUID
      description: What is your exact Minecraft username or UUID if applicable?
    validations:
      required: false
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Are you playing on Java or Bedrock?
      options:
        - Java Edition
        - Bedrock Edition
        - Website (Frontend/Browser)
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (screenshots, coordinates, etc).
    validations:
      required: false
