name: Build and Release

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
    
    - name: Generate Version Tag
      id: version
      run: echo "tag=v$(date +'%Y.%m.%d.%H%M%S')" >> $GITHUB_OUTPUT
    
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.x'
    
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Cache Go build cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/go-build
        key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-build-
      
    - name: Build Backend AMD64
      run: cd backend && GOOS=linux GOARCH=amd64 go build -o ../mtn-backend-amd64 ./cmd/server
    
    - name: Build Backend ARM64
      run: cd backend && GOOS=linux GOARCH=arm64 go build -o ../mtn-backend-arm64 ./cmd/server

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
    
    - name: Build Frontend
      run: cd frontend && npm install && npm run build
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        release_name: Release ${{ steps.version.outputs.tag }}
        body: |
          Automated release build
          Commit: ${{ github.sha }}
          Branch: ${{ github.ref }}
        draft: false
        prerelease: false
    
    - name: Upload Backend AMD64 to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./mtn-backend-amd64
        asset_name: mtn-backend-amd64
        asset_content_type: application/octet-stream
    
    - name: Upload Backend ARM64 to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./mtn-backend-arm64
        asset_name: mtn-backend-arm64
        asset_content_type: application/octet-stream
